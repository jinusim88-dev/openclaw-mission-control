  .mc-stat-card.red::before { background: var(--accent-red); }

  .mc-stat-header {

  .mc-stat-label {

  .mc-stats-dot.active {

    gap: 8px;
    margin-top: 10px;
  }

    font-size: 10px;
    font-weight: 600;

    letter-spacing: 0.5px;

  }

  .mc-cron-time {

    color: var(--text-dim);

  .mc-bottom-nav {

    bottom: 0;
    left: 0;
    right: 0;

    color: var(--text-dim);

  .mc-nav-item.active {

  }

  .mc-nav-icon {
    width: 24px;
    height: 24px;
  }

  .mc-nav-label {
    font-size: 11px;
    font-weight: 500;
  }

  /* Refresh button */
  .mc-refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 12px auto 0;
    padding: 6px 14px;
    background: rgba(136, 136, 255, 0.1);
    border: 1px solid rgba(136, 136, 255, 0.2);
    border-radius: 20px;
    color: var(--accent-blue);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .mc-refresh-btn:hover {
    background: rgba(136, 136, 255, 0.2);
    border-color: rgba(136, 136, 255, 0.4);
  }

  .mc-refresh-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .mc-refresh-btn .animate-spin {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Desktop Overrides */
  @media (min-width: 768px) {

    }

    .mc-header {
      padding: 24px 32px;
    }

    .mc-header-title {
      font-size: 28px;
    }

    .mc-stats-carousel {
      padding: 0 32px;
    }

    .mc-stat-card {
      flex: 0 0 calc(50% - 38px);
    }

    .mc-content {
      padding: 24px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .mc-bottom-nav {
      display: none;
    }

    /* Desktop tabs */
    .mc-desktop-tabs {
      display: flex;
      gap: 8px;
      padding: 0 32px;
      border-bottom: 1px solid var(--border-color);
    }

    .mc-desktop-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

      color: var(--text-secondary);
    }

    .mc-desktop-tab.active {
      color: var(--accent-green);
      border-bottom-color: var(--accent-green);
    }
  }

  @media (max-width: 767px) {
    .mc-desktop-tabs {
      display: none;
    }
